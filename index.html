<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQE & Jsc Calculator Web</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --panel-bg: #ffffff;
            --primary: #17A2B8;
            --success: #28a745;
            --purple: #8E44AD;
            --gray: #5D6D7E;
            --text-main: #333333;
            --text-muted: #777777;
            --border: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            text-align: center;
        }

        h1 { margin-top: 0; color: #2c3e50; }

        .flex-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .upload-box {
            border: 2px dashed var(--primary);
            border-radius: 8px;
            padding: 20px;
            flex: 1;
            background-color: #f0fbfc;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .upload-box:hover { background-color: #e0f4f7; }
        .upload-box input[type="file"] {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }

        .status-text { font-size: 0.9em; color: var(--text-muted); margin-top: 10px; display: block; }
        .step-info { font-size: 0.9em; font-style: italic; color: #0056b3; margin: 10px 0; font-weight: bold; }

        .params-box {
            background-color: #f8f9fa;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .params-box input {
            width: 70px; padding: 5px; margin-left: 5px; border: 1px solid #ccc;
            border-radius: 4px; text-align: center; font-weight: bold;
        }

        .jsc-display {
            font-size: 1.8em; font-weight: bold; color: #D35400; margin: 15px 0;
        }

        button {
            border: none; border-radius: 6px; padding: 10px 20px; font-size: 14px;
            font-weight: bold; cursor: pointer; transition: opacity 0.2s ease;
            color: white; margin: 5px;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #cccccc !important; cursor: not-allowed; }

        .btn-update { background-color: var(--primary); }
        .btn-export { background-color: var(--success); width: 45%; padding: 12px; font-size: 14px; }
        .btn-sheet { background-color: var(--purple); width: 45%; padding: 12px; font-size: 14px; }
        .btn-secondary { background-color: var(--gray); font-size: 12px; }

        /* Conteneur pour forcer le ratio du graphique */
        .plot-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            background-color: white;
            padding: 20px;
        }

        /* Ratio 1:1.4 (ex: Hauteur 500px, Largeur 700px) */
        #plot-div {
            width: 700px;
            height: 500px;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>EQE & Jsc Calculator</h1>

    <div class="flex-row">
        <div class="upload-box">
            <span style="font-weight: bold; color: var(--primary);">📁 Import Reference (2 files)</span>
            <input type="file" id="file-ref" multiple accept=".txt,.csv">
            <span class="status-text" id="status-ref">No Ref loaded</span>
        </div>
        <div class="upload-box">
            <span style="font-weight: bold; color: var(--primary);">📁 Import Cell (2 files)</span>
            <input type="file" id="file-cell" multiple accept=".txt,.csv">
            <span class="status-text" id="status-cell">No Cell loaded</span>
        </div>
    </div>

    <div id="step-detected" class="step-info">Step detected: --- nm</div>

    <div class="params-box">
        <label>Min: <input type="number" id="param-min" value="300"></label>
        <label>Max: <input type="number" id="param-max" value="1000"></label>
        <label>Step (nm): <input type="number" id="param-step" value="2" step="0.1"></label>
        <button class="btn-update" onclick="updateJsc()">↻ Update Jsc & Plot</button>
    </div>

    <div class="jsc-display" id="jsc-result">Jsc: --- mA/cm²</div>

    <div>
        <button class="btn-export" id="btn-exp-data" disabled onclick="exportCSV()">⬇ Export Data (CSV)</button>
        <button class="btn-sheet" id="btn-exp-sheet" disabled onclick="exportCalculationSheet()">⬇ Export Calculation Sheet</button>
    </div>
    
    <div style="margin-top: 10px;">
        <button class="btn-secondary" id="btn-exp-mref" disabled onclick="exportMergedData('ref')">Export Merged Ref</button>
        <button class="btn-secondary" id="btn-exp-mcell" disabled onclick="exportMergedData('cell')">Export Merged Cell</button>
        <button class="btn-secondary" onclick="exportStringData('Ref_Responsivity.txt', SR_REF_CONST)">Export Ref Specs</button>
        <button class="btn-secondary" onclick="exportStringData('Irradiance_AM1.5G.txt', AM15G_CONST)">Export AM1.5G Specs</button>
    </div>

    <div class="plot-wrapper">
        <div id="plot-div"></div>
    </div>
</div>

            range: [0, 30],
            dtick: 2,
            overlaying: 'y',
            side: 'right',
            showline: true, // Crée la ligne de droite
            linewidth: 2,
            linecolor: 'black',
            ticks: 'inside',
            ticklen: 6,
            tickwidth: 2,
            showgrid: false,
            zeroline: false,
            minor: { // Ajout des minor ticks (1 tous les 1mA/cm2)
                dtick: 1,
                ticks: 'inside',
                ticklen: 3,
                tickwidth: 1.5,
                tickcolor: 'black'
            }
        }
    };

    // Initialisation du graphique avec deux courbes "vides" pour forcer l'affichage des deux axes Y
    const initialTraces = [
        { x: [], y: [], type: 'scatter', mode: 'lines' }, // Trace invisible attachée à yaxis (gauche)
        { x: [], y: [], type: 'scatter', mode: 'lines', yaxis: 'y2' } // Trace invisible attachée à yaxis2 (droite)
    ];
    Plotly.newPlot('plot-div', initialTraces, layoutOrigin, plotConfig);

    // ==========================================
    // 3. Fonctions Utilitaires (Équivalents Numpy)
    // ==========================================
    function parseConstantsString(str) {
        const lines = str.trim().split('\n').slice(1);
        let wls = [], vals = [];
        for (let line of lines) {
            let cols = line.split(/[\t; ]+/);
            if (cols.length >= 2) {
                let w = parseFloat(cols[0].replace(',', '.'));
                let v = parseFloat(cols[1].replace(',', '.'));
                if (!isNaN(w) && !isNaN(v)) { wls.push(w); vals.push(v); }
            }
        }
        return { wl: wls, val: vals };
    }

    function npInterp(xArray, xpArray, ypArray) {
        let result = [];
        for (let i = 0; i < xArray.length; i++) {
            let x = xArray[i];
            if (x <= xpArray[0]) { result.push(ypArray[0]); continue; }
            if (x >= xpArray[xpArray.length - 1]) { result.push(ypArray[ypArray.length - 1]); continue; }
            
            let j = 0;
            while (j < xpArray.length - 1 && xpArray[j + 1] <= x) { j++; }
            if (xpArray[j] === x) { result.push(ypArray[j]); }
            else {
                let slope = (ypArray[j + 1] - ypArray[j]) / (xpArray[j + 1] - xpArray[j]);
                result.push(ypArray[j] + slope * (x - xpArray[j]));
            }
        }
        return result;
    }

    function npMedian(arr) {
        if (arr.length === 0) return 0;
        let sorted = [...arr].sort((a, b) => a - b);
        let half = Math.floor(sorted.length / 2);
        return sorted.length % 2 ? sorted[half] : (sorted[half - 1] + sorted[half]) / 2.0;
    }

    function npDiff(arr) {
        let diffs = [];
        for (let i = 0; i < arr.length - 1; i++) {
            diffs.push(arr[i + 1] - arr[i]);
        }
        return diffs;
    }

    function floatRange(start, stop, step) {
        let arr = [];
        for (let i = start; i <= stop + (step/10); i += step) { arr.push(i); }
        return arr;
    }

    // ==========================================
    // 4. Logique de Traitement des Fichiers
    // ==========================================
    function parseCustomFile(text, condition) {
        let lines = text.split('\n');
        let data = [];
        let reading = false;

        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('---')) break;
            if (line.startsWith('consigne WaveLenth')) { reading = true; continue; }
            if (reading && line) {
                let cols = line.split(';');
                if (cols.length >= 3) {
                    let wl = parseFloat(cols[0].replace(',', '.'));
                    let curr = Math.abs(parseFloat(cols[2].replace(',', '.')));
                    if (!isNaN(wl) && !isNaN(curr) && condition(wl)) {
                        data.push({wl, curr});
                    }
                }
            }
        }
        return data;
    }

    async function handleFileSelect(event, type) {
        const files = event.target.files;
        if (files.length !== 2) {
            alert("Veuillez sélectionner exactement 2 fichiers (ex: 200-580 et 560-1100).");
            return;
        }

        try {
            let texts = await Promise.all([files[0].text(), files[1].text()]);
            let name0 = files[0].name;
            
            let txtLow, txtHigh;
            if (name0.includes("200-580")) { txtLow = texts[0]; txtHigh = texts[1]; } 
            else { txtLow = texts[1]; txtHigh = texts[0]; }

            let lowData = parseCustomFile(txtLow, wl => wl < 580.0);
            let highData = parseCustomFile(txtHigh, wl => wl >= 580.0);
            
            let merged = lowData.concat(highData);
            let wls = merged.map(d => d.wl);
            let currs = merged.map(d => d.curr);

            if (type === 'ref') {
                state.refData = { wl: wls, curr: currs };
                document.getElementById('status-ref').innerText = "Reference Merged Successfully ✅";
                document.getElementById('status-ref').style.color = "var(--success)";
                document.getElementById('btn-exp-mref').disabled = false;
            } else {
                state.cellData = { wl: wls, curr: currs };
                state.cellName = files[0].name.replace("200-580", "").replace("560-1100", "").replace(/_-\s*$/, "").replace(".csv", "").replace(".txt", "");
                document.getElementById('status-cell').innerText = `Cell Merged Successfully ✅`;
                document.getElementById('status-cell').style.color = "var(--success)";
                document.getElementById('btn-exp-mcell').disabled = false;
            }

            checkAndDisplayStep();
            updateJsc();

        } catch (error) {
            alert("Erreur de lecture : " + error);
        }
    }

    document.getElementById('file-ref').addEventListener('change', (e) => handleFileSelect(e, 'ref'));
    document.getElementById('file-cell').addEventListener('change', (e) => handleFileSelect(e, 'cell'));

    function checkAndDisplayStep() {
        let stepRef = null, stepCell = null;
        let lbl = document.getElementById('step-detected');

        if (state.refData) stepRef = Math.round(npMedian(npDiff(state.refData.wl)) * 100) / 100;
        if (state.cellData) stepCell = Math.round(npMedian(npDiff(state.cellData.wl)) * 100) / 100;

        if (stepRef !== null && stepCell !== null) {
            if (stepRef !== stepCell) {
                alert(`INCOHÉRENCE DÉTECTÉE !\nRef: ${stepRef} nm\nCell: ${stepCell} nm`);
                lbl.innerText = "Step detected: ERROR (Mismatch)";
                lbl.style.color = "red";
            } else {
                lbl.innerText = `Step detected: ${stepRef} nm`;
                lbl.style.color = "var(--success)";
            }
        } else if (stepRef !== null) {
            lbl.innerText = `Step detected (Ref): ${stepRef} nm`;
        } else if (stepCell !== null) {
            lbl.innerText = `Step detected (Cell): ${stepCell} nm`;
        }
    }

    // ==========================================
    // 5. Moteur de Calcul
    // ==========================================
    function calculateArrays() {
        let minW = parseFloat(document.getElementById('param-min').value);
        let maxW = parseFloat(document.getElementById('param-max').value);
        let stepUser = parseFloat(document.getElementById('param-step').value);

        if(!SR_REF_CONST.trim() || !AM15G_CONST.trim()) {
            alert("Erreur : Les constantes de référence sont vides dans le code source HTML.");
            throw new Error("Missing Constants");
        }

        let srRef = parseConstantsString(SR_REF_CONST);
        let am15g = parseConstantsString(AM15G_CONST);

        let wlRaw = state.cellData.wl;
        let icRaw = state.cellData.curr;

        let stepCellRaw = Math.round(npMedian(npDiff(wlRaw)) * 100) / 100;
        let isInterpolated = Math.abs(stepUser - stepCellRaw) > 0.01;

        // Calculs RAW
        let irRaw = npInterp(wlRaw, state.refData.wl, state.refData.curr);
        let srRRaw = npInterp(wlRaw, srRef.wl, srRef.val);
        let amRaw = npInterp(wlRaw, am15g.wl, am15g.val);

        let eqeRaw = [], srCRaw = [], jDensRaw = [], intJRaw = [0], intCalcRaw = 0;

        for (let i = 0; i < wlRaw.length; i++) {
            let pInc = irRaw[i] / srRRaw[i];
            let src = icRaw[i] / pInc;
            srCRaw.push(src);

            let eqe = (src * HC_J_NM / E_CHARGE) / wlRaw[i] * 100;
            eqeRaw.push(eqe);

            let jDens = src * amRaw[i] * 0.1;
            jDensRaw.push(jDens);

            if (i > 0) {
                let maskPrev = (wlRaw[i-1] >= minW && wlRaw[i-1] <= maxW) ? jDensRaw[i-1] : 0;
                let maskCurr = (wlRaw[i] >= minW && wlRaw[i] <= maxW) ? jDens : 0;
                intCalcRaw += 0.5 * (maskCurr + maskPrev) * (wlRaw[i] - wlRaw[i-1]);
            }
            if(i>0) intJRaw.push(intCalcRaw);
        }

        let result = {
            isInterpolated, minW, maxW,
            wlRaw, eqeRaw, srCRaw, jDensRaw, intJRaw,
            totalJsc: intJRaw[intJRaw.length - 1]
        };

        if (isInterpolated) {
            let wlInterp = floatRange(Math.min(...wlRaw), Math.max(...wlRaw), stepUser);
            let icInterp = npInterp(wlInterp, wlRaw, icRaw);
            let irInterp = npInterp(wlInterp, state.refData.wl, state.refData.curr);
            let srRInterp = npInterp(wlInterp, srRef.wl, srRef.val);
            let amInterp = npInterp(wlInterp, am15g.wl, am15g.val);

            let eqeInterp = [], srCInterp = [], jDensInterp = [], intJInterp = [0], intCalcInterp = 0;

            for (let i = 0; i < wlInterp.length; i++) {
                let pInc = irInterp[i] / srRInterp[i];
                let src = icInterp[i] / pInc;
                srCInterp.push(src);

                let eqe = (src * HC_J_NM / E_CHARGE) / wlInterp[i] * 100;
                eqeInterp.push(eqe);

                let jDens = src * amInterp[i] * 0.1;
                jDensInterp.push(jDens);

                if (i > 0) {
                    let maskPrev = (wlInterp[i-1] >= minW && wlInterp[i-1] <= maxW) ? jDensInterp[i-1] : 0;
                    let maskCurr = (wlInterp[i] >= minW && wlInterp[i] <= maxW) ? jDens : 0;
                    intCalcInterp += 0.5 * (maskCurr + maskPrev) * (wlInterp[i] - wlInterp[i-1]);
                }
                if(i>0) intJInterp.push(intCalcInterp);
            }

            result.wlInterp = wlInterp;
            result.eqeInterp = eqeInterp;
            result.srCInterp = srCInterp;
            result.jDensInterp = jDensInterp;
            result.intJInterp = intJInterp;
            result.totalJsc = intJInterp[intJInterp.length - 1];
        }

        return result;
    }

    function updateJsc() {
        if (!state.refData || !state.cellData) return;
        try {
            state.lastCalc = calculateArrays();
            
            // UI Updates
            document.getElementById('jsc-result').innerText = `Jsc: ${state.lastCalc.totalJsc.toFixed(3)} mA/cm²`;
            document.getElementById('btn-exp-data').disabled = false;
            document.getElementById('btn-exp-sheet').disabled = false;

            // Plot Updates
            let c = state.lastCalc;
            let wl_plot = c.isInterpolated ? c.wlInterp : c.wlRaw;
            let eqe_plot = c.isInterpolated ? c.eqeInterp : c.eqeRaw;
            let int_j_plot = c.isInterpolated ? c.intJInterp : c.intJRaw;

            // Ligne EQE
            let traceEQE = {
                x: wl_plot, y: eqe_plot,
                type: 'scatter', mode: 'lines',
                line: {color: '#555555', width: 2.5}
            };

            // Ligne Jsc (en pointillés : 'dash')
            let traceJSC = {
                x: wl_plot, y: int_j_plot,
                type: 'scatter', mode: 'lines',
                line: {color: '#555555', width: 2.5, dash: 'dash'},
                yaxis: 'y2'
            };

            // Mise à jour de la zone X en fonction des inputs
            layoutOrigin.xaxis.range = [c.minW, c.maxW];

            Plotly.react('plot-div', [traceEQE, traceJSC], layoutOrigin, plotConfig);

        } catch (e) {
            console.error(e);
        }
    }

    // ==========================================
    // 6. Exports
    // ==========================================
    function downloadString(filename, content) {
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function exportStringData(filename, str) {
        downloadString(filename, str);
    }

    function exportMergedData(type) {
        let data = type === 'ref' ? state.refData : state.cellData;
        if (!data) return;
        let content = `Wavelength(nm)\t${type === 'ref' ? 'Ref' : 'Cell'}_Current(A)\n`;
        for (let i=0; i<data.wl.length; i++) {
            content += `${data.wl[i].toFixed(3)}\t${data.curr[i].toExponential(4)}\n`;
        }
        let fname = type === 'ref' ? "Merged_Ref_Current.csv" : `${state.cellName}_Merged_Cell_Current.csv`;
        downloadString(fname, content);
    }

    function exportCSV() {
        if (!state.lastCalc) return;
        const c = state.lastCalc;
        let content = "";

        if (!c.isInterpolated) {
            content += "Wavelength(nm)\tEQE(%)\tCell_Responsivity(A/W)\tJsc(mA/cm2/nm)\tInt_Jsc(mA/cm2)\n";
            for (let i = 0; i < c.wlRaw.length; i++) {
                content += `${c.wlRaw[i].toFixed(3)}\t${c.eqeRaw[i].toFixed(4)}\t${c.srCRaw[i].toFixed(4)}\t${c.jDensRaw[i].toFixed(6)}\t${c.intJRaw[i].toFixed(5)}\n`;
            }
        } else {
            content += "Wavelength_Raw(nm)\tEQE_Raw(%)\tCell_Resp_Raw(A/W)\t\tWavelength_Interp(nm)\tEQE_Interp(%)\tCell_Resp_Interp(A/W)\tJsc_Interp(mA/cm2/nm)\tInt_Jsc_Interp(mA/cm2)\n";
            let maxLen = Math.max(c.wlRaw.length, c.wlInterp.length);
            for (let i = 0; i < maxLen; i++) {
                let row = [];
                row.push(i < c.wlRaw.length ? c.wlRaw[i].toFixed(3) : "");
                row.push(i < c.wlRaw.length ? c.eqeRaw[i].toFixed(4) : "");
                row.push(i < c.wlRaw.length ? c.srCRaw[i].toFixed(4) : "");
                row.push(""); // espace
                row.push(i < c.wlInterp.length ? c.wlInterp[i].toFixed(3) : "");
                row.push(i < c.wlInterp.length ? c.eqeInterp[i].toFixed(4) : "");
                row.push(i < c.wlInterp.length ? c.srCInterp[i].toFixed(4) : "");
                row.push(i < c.wlInterp.length ? c.jDensInterp[i].toFixed(6) : "");
                row.push(i < c.wlInterp.length ? c.intJInterp[i].toFixed(5) : "");
                content += row.join("\t") + "\n";
            }
        }
        downloadString(`EQE_${state.cellName}.csv`, content);
    }

    function exportCalculationSheet() {
        if (!state.lastCalc) return;
        const c = state.lastCalc;
        
        let srRef = parseConstantsString(SR_REF_CONST);
        let am15g = parseConstantsString(AM15G_CONST);
        let wlRaw = state.cellData.wl;
        let icRaw = state.cellData.curr;

        let irAligned = npInterp(wlRaw, state.refData.wl, state.refData.curr);
        let srRAligned = npInterp(wlRaw, srRef.wl, srRef.val);
        let amAligned = npInterp(wlRaw, am15g.wl, am15g.val);
        let stepCellRaw = Math.round(npMedian(npDiff(wlRaw)) * 100) / 100;

        let header = `Constants\th (m2.kg.s-1)\t${H_PLANCK.toExponential(8)}\n\tc(m.s-1)\t${C_LIGHT.toFixed(2)}\n\thc(J.nm)\t${HC_J_NM.toExponential(8)}\n\te(C)\t${E_CHARGE.toExponential(9)}\n\tIntegration step(nm)\t${stepCellRaw}\n\n`;
        header += "\thc/λ\t\t\t\tRef_Current/Ref_Responsivity\tIncident Power/Energy per Photon\t\t\t\t\t\tCell_Current/Incident Power\tAM1.5G×Cell_Responsivity×0.1\tIntegration\n";
        header += "Wavelength(nm)\tEnergy per Photon (J/Photon)\tAM1.5G(W/m2/nm)\tRef_Current(A)\tRef_Responsivity(A/W)\tIncident Power (W)\tPhoton/s\t\tCell_Current(A)\tElectron/s\t\tEQE(%)\tCell_Responsivity(A/W)\tJsc_density(mA/cm2/nm)\tInt_Jsc(mA/cm2)\n";

        let content = header;
        for (let i = 0; i < wlRaw.length; i++) {
            let ePhot = HC_J_NM / wlRaw[i];
            let pInc = irAligned[i] / srRAligned[i];
            let photS = pInc / ePhot;
            let elecS = icRaw[i] / E_CHARGE;
            let eqeCalc = (elecS / photS) * 100;

            let row = [
                wlRaw[i].toFixed(3), ePhot.toExponential(6), amAligned[i].toFixed(4),
                irAligned[i].toExponential(4), srRAligned[i].toFixed(4), pInc.toExponential(4),
                photS.toExponential(4), "", icRaw[i].toExponential(4), elecS.toExponential(4),
                "", eqeCalc.toFixed(4), c.srCRaw[i].toFixed(4), c.jDensRaw[i].toFixed(6), c.intJRaw[i].toFixed(5)
            ];
            content += row.join("\t") + "\n";
        }
        
        downloadString(`${state.cellName}_Calculation_Sheet.csv`, content);
    }
